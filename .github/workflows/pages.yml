name: Deploy demo to GitHub Pages

# Builds the viewer against the synthetic sample data (no personal chats) and
# publishes it to GitHub Pages. The live demo is purely the fake `make demo`
# map — no real conversation data is ever built or uploaded here.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: viewer/package-lock.json

      # Generate sample exports + build map.json + per-conversation files into
      # viewer/public/. Embeddings download the model once (cached by HF).
      - name: Build sample map
        run: make -C pipeline demo

      - name: Build viewer
        working-directory: viewer
        run: |
          npm ci
          npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: viewer/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
